{% extends "base.html" %}
{% block content %}

<h2>Búsqueda de activos</h2>

<form method="POST">
    <input type="text" name="busqueda" placeholder="Buscar por código o nombre">
    <button type="submit">Buscar</button>
</form>

<br>

<table border="1" width="100%">
<tr>
    <th>Código</th>
    <th>Nombre</th>
    <th>Área</th>
    <th>Responsable</th>
    <th>Estado</th>
</tr>

{% for r in resultados %}
<tr>
    <td>{{ r.codigo }}</td>
    <td>{{ r.nombre }}</td>
    <td>{{ r.area }}</td>
    <td>{{ r.responsable }}</td>
    <td>{{ r.estado }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
